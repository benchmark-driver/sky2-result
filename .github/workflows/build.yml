name: build
on:
  push:
    branches:
      - master
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Actions of sky2-viewer
        run: |
          curl -X POST -H 'Accept: application/vnd.github.everest-preview+json' \
            -H 'Content-Type: application/json' --data '{"event_type": "build"}' \
            -H "Authorization: token ${{ secrets.GH_REPO_TOKEN }}" \
            https://api.github.com/repos/benchmark-driver/sky2-viewer/dispatches
