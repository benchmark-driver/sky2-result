name: build
on:
  push:
    branches:
      - master
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Actions of sky2-viewer
        run: |
          curl -v -X POST -H 'Accept: application/vnd.github.everest-preview+json' \
            -H 'Content-Type: application/json' -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/ruby/actions/dispatches --data '{"event_type": "build"}'
